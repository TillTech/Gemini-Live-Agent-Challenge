name: Public Release Audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan tracked history for secrets and sensitive filenames
        run: |
          python <<'PY'
          import re
          import subprocess
          import sys

          path_allowlist = {'.env.example'}
          path_pattern = re.compile(
              r'(^|/)(\.env(\.|$)?|.*\.(pem|key|p12|pfx|crt|cer)|.*(credentials|service-account).+\.json)$',
              re.IGNORECASE,
          )
          content_patterns = {
              'aws_access_key': re.compile(rb'AKIA[0-9A-Z]{16}'),
              'github_pat': re.compile(rb'github_pat_[A-Za-z0-9_]{20,}'),
              'ghp_token': re.compile(rb'ghp_[A-Za-z0-9]{36}'),
              'google_api_key': re.compile(rb'AIza[0-9A-Za-z\-_]{35}'),
              'private_key': re.compile(rb'-----BEGIN (RSA|EC|OPENSSH|DSA|PGP) PRIVATE KEY-----'),
              'oauth_refresh_token': re.compile(rb'"refresh_token"\s*:\s*"[^"]+"'),
              'oauth_client_secret': re.compile(rb'"client_secret"\s*:\s*"[^"]+"'),
              'service_account_type': re.compile(rb'"type"\s*:\s*"service_account"'),
          }

          history = subprocess.check_output(['git', 'rev-list', '--objects', '--all'], text=True)
          seen = set()
          findings = []

          for line in history.splitlines():
              sha, *rest = line.split(' ', 1)
              path = rest[0] if rest else ''
              if not path or sha in seen:
                  continue
              seen.add(sha)

              if path not in path_allowlist and path_pattern.search(path):
                  findings.append(f'suspicious filename in history: {path}')

              try:
                  blob = subprocess.check_output(['git', 'cat-file', '-p', sha], stderr=subprocess.DEVNULL)
              except subprocess.CalledProcessError:
                  continue

              if b'\x00' in blob[:8192]:
                  continue

              matches = [name for name, pattern in content_patterns.items() if pattern.search(blob)]
              if matches:
                  findings.append(f'secret pattern in {path}: {", ".join(matches)}')

          if findings:
              print('Public release audit failed:')
              for finding in findings:
                  print(f'- {finding}')
              sys.exit(1)

          print('Public release audit passed: no sensitive filenames or known secret patterns found in tracked history.')
          PY
